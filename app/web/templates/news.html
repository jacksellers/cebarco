{% extends "base.html" %}


{% block description %}

{% endblock %}


{% block title %}
News
{% endblock %}


{% block head %}

{% endblock %}


{% block content %}
<div class="container">
    <div class="row">
        <div class="col-sm">
            <h3 style="text-align: center;"><b>News</b></h3>
        </div>
    </div>
</div>
<div class="card-columns">
    {% for article in articles %}
        <div class="card">
            <a href="{% url 'web:article' slug=article.slug %}">
                <img class="card-img-top" src="{{ article.image.url }}" alt="Card image cap">
                <div class="card-body">
                    <h6 class="card-title">{{ article.title }}</h6>
                    <p class="card-text">{{ article.intro }}</p>
                    <p class="card-text"><small class="text-muted">{{ article.date|date:"M Y" }}</small></p>
                </div>
            </a>
        </div>
    {% endfor %}
</div>
{% endblock %}
